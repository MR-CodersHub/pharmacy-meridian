<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="root-path" content="../../">
  <title>Meridian — Clinical Portal Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/css/style.css">
</head>
<body>

  <main class="m-auth-wrap" style="flex-direction:column; gap:48px; max-width:680px; margin:0 auto; width:100%;">
    <div class="m-auth-card" style="border: 1px solid var(--line-strong); background:var(--card); border-top: 3.5px solid var(--accent); width:100%;">
      <div class="m-auth-head">
        <a href="../../index.html" class="m-logo" style="justify-content:center; margin-bottom:12px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="color:var(--accent);flex-shrink:0;"><path d="M12 2v20M2 12h20" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/></svg>
          Meridian<span>.</span>
        </a>
        <h1 style="font-size:1.55rem; font-weight:800; letter-spacing:-0.025em; margin-bottom:4px; color:var(--ink);">Log In Care Portal</h1>
        <p style="font-size:0.83rem; color:var(--ink-soft); line-height:1.4;">Access your wellness prescriptions, refills checklist, and clinician chat logs.</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label for="loginEmail" class="m-label">Care Email Address</label>
          <input type="email" id="loginEmail" class="m-input" required placeholder="user@meridian.com">
        </div>

        <div>
          <label for="loginPassword" class="m-label">Password</label>
          <input type="password" id="loginPassword" class="m-input" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
          Verify Credentials →
        </button>
      </form>

      <!-- Toggle Link -->
      <div style="text-align:center;margin-top:20px;font-size:0.85rem;">
        <p style="color:var(--ink-soft);">Don't have a health account? <a href="signup.html" style="color:var(--ink);font-weight:600;text-decoration:underline;">Register here</a></p>
      </div>
    </div>
  </main>


  <script src="../../src/js/products.js"></script>
  <script src="../../src/js/auth.js"></script>
</body>
</html>
