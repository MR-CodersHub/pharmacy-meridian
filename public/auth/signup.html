<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="root-path" content="../../">
  <meta name="description" content="Create your Meridian Care Account to manage prescriptions, track orders, and connect with licensed pharmacists.">
  <title>Meridian — Register Account</title>
  <link rel="icon" href="../../assets/favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/css/style.css">
</head>

<body>

  <div id="navbar-container"></div>

  <main class="m-auth-wrap" style="flex-direction:column; gap:0; padding-top:120px; padding-bottom:80px; min-height:100vh;">
    <div style="width:100%; max-width:520px; margin:0 auto; padding:0 24px;">

      <div class="m-auth-card" style="border: 1px solid var(--line-strong); background:var(--card); border-top: 3.5px solid var(--accent); width:100%;">
        <div class="m-auth-head">
          <a href="../../index.html" class="m-logo" style="justify-content:center; margin-bottom:18px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="color:var(--accent);flex-shrink:0;">
              <path d="M12 2v20M2 12h20" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" />
            </svg>
            Meridian<span>.</span>
          </a>
          <h1 style="font-size:1.55rem; font-weight:800; letter-spacing:-0.025em; margin-bottom:6px; color:var(--ink);">Create your account</h1>
          <p style="font-size:0.86rem; color:var(--ink-soft); line-height:1.5;">Sign up to manage prescriptions, track order shipping, and check copays.</p>
        </div>

        <!-- Signup Form -->
        <form id="signupForm" style="display:flex;flex-direction:column;gap:0;" novalidate>
          <div class="m-field">
            <label class="m-label" for="signupName">Full Name</label>
            <input type="text" id="signupName" class="m-input" placeholder="e.g. John Doe" required autocomplete="name">
          </div>

          <div class="m-field">
            <label class="m-label" for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" class="m-input" placeholder="name@domain.com" required autocomplete="email">
          </div>

          <div class="m-field">
            <label class="m-label" for="signupPhone">Phone Number <span style="color:var(--ink-faint);font-weight:400;">(optional)</span></label>
            <input type="tel" id="signupPhone" class="m-input" placeholder="+1 (555) 000-0000" autocomplete="tel">
          </div>

          <div class="m-form-row">
            <div class="m-field" style="margin-bottom:0;">
              <label class="m-label" for="signupPassword">Password</label>
              <input type="password" id="signupPassword" class="m-input" placeholder="••••••••" required autocomplete="new-password">
            </div>
            <div class="m-field" style="margin-bottom:0;">
              <label class="m-label" for="signupRole">Account Type</label>
              <div style="position:relative;">
                <select id="signupRole" class="m-select" required>
                  <option value="user">Patient (User)</option>
                  <option value="admin">Pharmacist (Admin)</option>
                </select>
                <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:0.6rem;color:var(--ink-soft);">▼</span>
              </div>
            </div>
          </div>

          <div style="margin-bottom:20px;margin-top:8px;">
            <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
              <input type="checkbox" id="signupConsent" style="margin-top:2px;accent-color:var(--accent);width:14px;height:14px;flex-shrink:0;" required>
              <span style="font-size:0.8rem;color:var(--ink-soft);line-height:1.5;">
                I agree to Meridian's <a href="../pages/Terms-of-service.html" style="color:var(--accent);font-weight:500;">Terms of Service</a> and <a href="../pages/Privacy-policy.html" style="color:var(--accent);font-weight:500;">Privacy Policy</a>.
              </span>
            </label>
          </div>

          <button type="submit" class="btn-primary" id="signupSubmitBtn" style="width:100%;justify-content:center;padding:14px 20px;">
            Create Account →
          </button>
        </form>

        <!-- Divider -->
        <div style="display:flex;align-items:center;gap:12px;margin:24px 0;">
          <hr style="flex:1;border:none;border-top:1px solid var(--line);">
          <span style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ink-faint);letter-spacing:0.04em;">OR</span>
          <hr style="flex:1;border:none;border-top:1px solid var(--line);">
        </div>

        <!-- Toggle Link -->
        <div style="text-align:center;font-size:0.86rem;">
          <p style="color:var(--ink-soft);">Already registered? <a href="login.html" style="color:var(--accent);font-weight:600;">Log in here →</a></p>
        </div>
      </div>

      <!-- Info Note -->
      <div class="m-auth-info" style="margin-top:20px;">
        <strong>🔒 HIPAA Compliant</strong> — Your health data is stored with AES-256 encryption and never sold to third parties. You can delete your account anytime.
      </div>

    </div>
  </main>

  <div id="footer-container"></div>

  <script src="../../src/js/products.js"></script>
  <script src="../../src/js/navbar.js"></script>
  <script src="../../src/js/auth.js"></script>
  <script src="../../src/js/form-validation.js"></script>

  <style>
    @media (max-width: 480px) {
      .m-field-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</body>

</html>
