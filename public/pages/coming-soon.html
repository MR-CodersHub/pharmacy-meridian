<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="root-path" content="../../">
  <title>Meridian — Systems Upgrade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/css/style.css">
  <style>
    .maintenance-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body class="maintenance-layout">
  
  <!-- Minimal Header -->
  <header style="border-bottom:1px solid var(--line);padding:24px 0;">
    <div class="wrap" style="display:flex;justify-content:space-between;align-items:center;">
      <a href="../../index.html" class="m-logo">Meridian<span>.</span></a>
      <a href="../../index.html" class="m-back-link" style="margin-bottom:0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Go Home
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main style="display:flex;align-items:center;justify-content:center;flex:1;padding:64px 24px;">
    <div style="text-align:center;max-width:480px;display:flex;flex-direction:column;align-items:center;gap:24px;">
      <span class="m-tag m-tag-accent">SYSTEMS MAINTENANCE</span>
      <h1 style="font-size:clamp(1.8rem, 4vw, 2.4rem);font-weight:700;line-height:1.15;letter-spacing:-0.02em;">
        We are Upgrading Our Prescription Server.
      </h1>
      <p style="font-size:0.88rem;color:var(--ink-soft);line-height:1.6;">
        Our engineers are implementing HIPAA security patches. Meridian services will resume online in:
      </p>

      <!-- Countdown Timer -->
      <div class="m-countdown-grid">
        <div class="m-countdown-cell">
          <span id="timerDays" class="m-countdown-num">02</span>
          <span class="m-countdown-lbl">Days</span>
        </div>
        <div class="m-countdown-cell">
          <span id="timerHours" class="m-countdown-num">14</span>
          <span class="m-countdown-lbl">Hours</span>
        </div>
        <div class="m-countdown-cell">
          <span id="timerMins" class="m-countdown-num">55</span>
          <span class="m-countdown-lbl">Mins</span>
        </div>
        <div class="m-countdown-cell">
          <span id="timerSecs" class="m-countdown-num">07</span>
          <span class="m-countdown-lbl">Secs</span>
        </div>
      </div>

      <!-- Notify Form -->
      <div class="m-panel" style="width:100%;margin-top:16px;">
        <form id="maintenanceNotifyForm" style="display:flex;flex-direction:column;gap:12px;">
          <h4 style="font-size:0.9rem;font-weight:600;margin-bottom:4px;">Get Notified When Live</h4>
          <div style="display:flex;gap:12px;">
            <input type="email" id="notifyEmailInput" class="m-input" placeholder="name@domain.com" required style="flex:1;">
            <button type="submit" class="m-btn solid">Notify Me</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Minimal Footer -->
  <footer style="border-top:1px solid var(--line);padding:24px 0;text-align:center;">
    <span style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--ink-faint);">© 2026 MERIDIAN SYSTEMS ORG. ALL RIGHTS RESERVED.</span>
  </footer>

  <script src="../../src/js/products.js"></script>
  <script src="../../src/js/navbar.js"></script>
  <script src="../../src/js/auth.js"></script>
  
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const days = document.getElementById("timerDays");
      const hours = document.getElementById("timerHours");
      const mins = document.getElementById("timerMins");
      const secs = document.getElementById("timerSecs");

      let d = 2, h = 14, m = 55, s = 7;
      setInterval(() => {
        s--;
        if (s < 0) {
          s = 59;
          m--;
          if (m < 0) {
            m = 59;
            h--;
            if (h < 0) {
              h = 23;
              d--;
              if (d < 0) {
                d = 2;
              }
            }
          }
        }
        if (days) days.innerText = String(d).padStart(2, "0");
        if (hours) hours.innerText = String(h).padStart(2, "0");
        if (mins) mins.innerText = String(m).padStart(2, "0");
        if (secs) secs.innerText = String(s).padStart(2, "0");
      }, 1000);

      const form = document.getElementById("maintenanceNotifyForm");
      if (form) {
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const email = document.getElementById("notifyEmailInput").value;
          form.reset();
          if (window.showNotificationModal) {
            window.showNotificationModal("Notification Registered", `We will email you at ${email} once our server upgrade is complete.`);
          } else {
            alert("Notification registered.");
          }
        });
      }
    });
  </script>
</body>
</html>
