<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="root-path" content="../../">
  <title>Meridian — Page Not Found</title>
  <link rel="icon" href="../../assets/favicon.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../src/css/style.css">
  <style>
    .error-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
  </style>
</head>
<body class="error-layout">
  
   <!-- Minimal Header -->
  <header style="border-bottom:1px solid var(--line);padding:24px 0;">
    <div class="wrap" style="display:flex;justify-content:space-between;align-items:center;">
      <a href="../../index.html" class="m-logo">Meridian<span>.</span></a>
      <a href="../../index.html" class="m-back-link" style="margin-bottom:0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Go Home
      </a>
    </div>
  </header>

  <!-- Main Content -->
  <main style="display:flex;align-items:center;justify-content:center;flex:1;padding:64px 24px; position:relative; overflow:hidden;">
    <!-- Faint background cross decoration -->
    <span aria-hidden="true" style="position:absolute; top:20%; left:10%; font-size:120px; font-weight:700; color:var(--accent); opacity:0.04; font-family:'Inter',sans-serif;">+</span>
    <span aria-hidden="true" style="position:absolute; bottom:20%; right:10%; font-size:120px; font-weight:700; color:var(--accent); opacity:0.04; font-family:'Inter',sans-serif;">+</span>

    <div style="text-align:center;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:20px; z-index:2;">
      <span style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--accent);letter-spacing:0.06em;font-weight:600;">[ ERROR 404 ]</span>
      <h1 style="font-size:clamp(4rem, 10vw, 6.5rem);font-weight:800;line-height:1;letter-spacing:-0.04em; color:var(--ink);">404</h1>
      <h2 style="font-size:1.3rem;font-weight:700;letter-spacing:-0.015em; color:var(--ink);">Prescription File Not Found</h2>
      <p style="font-size:0.88rem;color:var(--ink-soft);line-height:1.65;">
        The wellness portal or clinical page you are trying to visit does not exist or has been moved to another health record directory.
      </p>
      <div style="margin-top:12px;">
        <a href="../../index.html" class="btn-primary">Return to Home →</a>
      </div>
    </div>

  </main>

  <!-- Minimal Footer -->
  <footer style="border-top:1px solid var(--line);padding:24px 0;text-align:center; width:100%;">
    <span style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--ink-faint);">© 2026 MERIDIAN SYSTEMS ORG. ALL RIGHTS RESERVED.</span>
  </footer>

</body>
</html>
